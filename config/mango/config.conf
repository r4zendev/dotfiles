blur=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5

shadows=1
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadowscolor=0x000000aa

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1

new_is_master=1
default_mfact=0.55
default_nmaster=1

enable_hotarea=0
ov_tab_mode=1

focus_on_activate=1
sloppyfocus=1
warpcursor=1
cursor_size=24

repeat_rate=40
repeat_delay=300
numlockon=1
xkb_rules_layout=us,ru,ua
xkb_rules_options=grp:win_space_toggle

mouse_natural_scrolling=0

gappih=8
gappiv=8
gappoh=12
gappov=12
borderpx=2
rootcolor=0x1a1a1aff
bordercolor=0x585b70ff
focuscolor=0x33ccffff
urgentcolor=0xad401fff
source=~/.cache/matugen/mango.conf

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

monitorrule=name:^DP-3$,width:1920,height:1080,refresh:360,scale:1

exec-once=sh -c 'systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP MANGO_INSTANCE_SIGNATURE; systemctl --user start graphical-session.target'

bind=SUPER,q,spawn,ghostty
bind=SUPER,p,spawn,dolphin
bind=SUPER,c,killclient,
bind=SUPER+CTRL+SHIFT,q,spawn,systemctl poweroff
bind=SUPER+SHIFT,e,quit
bind=SUPER+SHIFT,r,reload_config

bind=SUPER,r,spawn,dms ipc call spotlight toggle
bind=SUPER,n,spawn,dms ipc call notifications toggle
bind=SUPER,comma,spawn,dms ipc call settings toggle
bind=SUPER,v,spawn,dms ipc call clipboard toggle
bind=SUPER,m,spawn,dms ipc call processlist toggle
bind=SUPER+SHIFT,n,spawn,dms ipc call notepad toggle
bind=SUPER+SHIFT,b,spawn,dms ipc call night toggle
bind=SUPER+CTRL,t,spawn,dms ipc call theme toggle
bind=SUPER,slash,spawn,dms ipc call keybinds toggle
bind=SUPER+ALT,l,spawn,dms ipc call lock lock
bind=SUPER,x,spawn,dms ipc call powermenu toggle

bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

bind=SUPER+CTRL,Left,resizewin,-50,+0
bind=SUPER+CTRL,Right,resizewin,+50,+0
bind=SUPER+CTRL,Up,resizewin,+0,-50
bind=SUPER+CTRL,Down,resizewin,+0,+50

bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,t,togglefloating,
bind=SUPER,Tab,toggleoverview,
bind=SUPER,d,spawn,dms ipc call spotlight toggle
bind=SUPER+ALT,s,spawn,hyprwhspr record toggle
bind=SUPER+SHIFT,backslash,switch_layout

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

bind=SUPER,o,viewtoleft_have_client,0
bind=SUPER,u,viewtoright_have_client,0

bind=SUPER+SHIFT,s,spawn,dms screenshot region
bind=SUPER+SHIFT,a,spawn,sh -c 'dms screenshot region --stdout --no-file --no-clipboard | satty -f -'
bind=none,Print,spawn,dms screenshot full

bind=SUPER+ALT,d,spawn,sh -c '~/.config/hyprwhspr/mic-hyprwhspr.sh record en'
bind=SUPER+ALT,s,spawn,sh -c '~/.config/hyprwhspr/mic-hyprwhspr.sh record ru'

bind=SUPER,F1,spawn,brightnessctl -e4 -n2 set 5%-
bind=SUPER,F2,spawn,brightnessctl -e4 -n2 set 5%+
bind=SUPER,F3,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=SUPER,F4,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=SUPER,F8,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=SUPER,F9,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=SUPER,F10,spawn,playerctl play-pause
bind=SUPER,F11,spawn,playerctl previous
bind=SUPER,F12,spawn,playerctl next

bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=none,XF86AudioPlay,spawn,playerctl play-pause
bind=none,XF86AudioNext,spawn,playerctl next
bind=none,XF86AudioPrev,spawn,playerctl previous
bind=none,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=none,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-

bind=SUPER+ALT+SHIFT,r,spawn,fish -c 'wallpaper random'
bind=SUPER+ALT+SHIFT,p,spawn,fish -c 'wallpaper prev'
bind=SUPER+ALT+SHIFT,m,spawn,fish -c 'wallpaper toggle'
bind=SUPER+ALT+SHIFT,w,spawn,fish -c 'wallpaper toggle-nsfw'

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_side,spawn,ydotool click 0xC4
